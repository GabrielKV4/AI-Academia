<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Academia</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="static/style.css">
    
</head>

<body>

    <div class="text-end mb-3">
    <button id="themeToggle" class="btn btn-outline-secondary btn-sm">
        Toggle Dark Mode
    </button>
    </div>

    <div class="container py-5">

        <div class="text-center mb-5">
            <h1 class="fw-bold">AI Academia </h1>
            <p class="text-muted"></p>
        </div>

        <!-- Input Section -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5 class="fw-bold mb-3">Slide Content Input</h5>

                <div class="area mb-3">
                    <input type="file" id="upload" />
                    <div class="upload-content">
                        <img src="https://cdn-icons-png.flaticon.com/512/4147/4147103.png" width="64" alt="Upload Icon">
                        <p class="mt-2 fw-semibold">Upload File...</p>
                    </div>
                </div>

                <!-- <textarea id="inputText" class="form-control mb-3" rows="8"
                    placeholder="Paste lecture slide content here...">
                </textarea> -->

                <div class="text-center">
                    <button class="btn btn-primary px-4" onclick="generateSummary()">
                        Generate Summary
                    </button>
                </div>
            </div>
        </div>

        <!-- Output Section -->
        <div class="output-container">
            <div id="outputArea">
                <p class="text-muted">Generated structured summary will appear here.</p>
            </div>
        </div>

    </div>

    <!-- Marked.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="static/script.js"></script>

</body>
</html>
